<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="basestyle.css" />
		<title>Mobius Spellbook</title>
	</head>
	<body class="unselectable">
		<section class="resource-wrapper">
			<section class="resource-collection-wrapper">
				<div class="resource-box">
					<span class="resource-name">Herbs</span>
					<button
						class="resource-collection-button color-inactive"
						id="herb-button"
						onclick="resourceBarClick('herb')"
					>
						<p>Collect Herb</p>
						<p><span id="herb-sec">0</span>/sec</p>
					</button>
					<p class="resource-storage">
						<span id="herb-current">0</span> /
						<span id="herb-storage-max">250</span>
					</p>
				</div>
				<div class="resource-box">
					<span class="resource-name">Mythril</span>
					<button
						class="resource-collection-button color-inactive"
						id="mythril-button"
						onclick="resourceBarClick('mythril')"
					>
						<p>Collect Mythril</p>
						<p><span id="mythril-sec">0</span>/sec</p>
					</button>
					<p class="resource-storage">
						<span id="mythril-current">0</span> /
						<span id="mythril-storage-max">250</span>
					</p>
				</div>
				<div class="resource-box">
					<span class="resource-name">Yew</span>
					<button
						class="resource-collection-button color-inactive"
						id="yew-button"
						onclick="resourceBarClick('yew')"
					>
						<p>Collect Yew</p>
						<p><span id="yew-sec">0</span>/sec</p>
					</button>
					<p class="resource-storage">
						<span id="yew-current">0</span> /
						<span id="yew-storage-max">250</span>
					</p>
				</div>
				<div class="resource-box">
					<span class="resource-name">Crystal</span>
					<button
						class="resource-collection-button color-inactive"
						id="crystal-button"
						onclick="resourceBarClick('crystal')"
					>
						<p>Collect Crystal</p>
						<p><span id="crystal-sec">0</span>/sec</p>
					</button>
					<p class="resource-storage">
						<span id="crystal-current">0</span> /
						<span id="crystal-storage-max">250</span>
					</p>
				</div>
				<div class="resource-box">
					<span class="resource-name">Arcana</span>
					<button
						class="resource-collection-button color-inactive"
						id="arcana-button"
						onclick="resourceBarClick('arcana')"
					>
						<p>Collect Arcana</p>
						<p><span id="arcana-sec">0</span>/sec</p>
					</button>
					<p class="resource-storage">
						<span id="arcana-current">0</span> /
						<span id="arcana-storage-max">250</span>
					</p>
				</div>
			</section>
			<section class="special-resources-wrapper"></section>
		</section>
		<section class="combat-wrapper" id="combat-wrapper">
			<div class="player-wrapper hidden" id="player-wrapper">
				<div class="player-name" id="player-name">You</div>
				<div class="player-attack">Atk: 
					<span id="player-attack">0</span>
				</div>
				<div class="player-health">HP: 
					<div class="health-display">
						<div class="player-health-bar" id="player-health-bar">
						</div>
						<div class="health-numbers">
							<span id="player-healthCurrent">0</span> / <span id="player-healthMax">0</span>
						</div>
					</div>
				</div>
				<div class="player-defense">Def: <span  id="player-defense">0</span></div>
				<div class="player-mana">MP: 
					<div class="mana-display">
						<div class="player-mana-bar" id="player-mana-bar">
						</div>
						<div class="mana-numbers">
							<span id="player-manaCurrent">0</span> / <span id="player-manaMax"></span>
						</div>
					</div>
				</div>
			</div>
			<div class="enemy-wrapper hidden" id="enemy-wrapper">
				<div class="enemy-name" id="enemy-name"></div>
				<div class="enemy-attack">Atk: 
					<span id="enemy-attack">0</span>
				</div>
				<div class="enemy-health">HP: 
					<div class="health-display">
						<div class="enemy-health-bar" id="enemy-health-bar">
						</div>
						<div class="health-numbers">
							<span id="enemy-healthCurrent">0</span> / <span id="enemy-healthMax">0</span>
						</div>
					</div>
				</div>
				<div class="enemy-defense">Def: <span  id="enemy-defense">0</span></div>
				<div class="enemy-mana">MP: 
					<div class="mana-display">
						<div class="enemy-mana-bar" id="enemy-mana-bar">
						</div>
						<div class="mana-numbers">
							<span id="enemy-manaCurrent">0</span> / <span id="enemy-manaMax"></span>
						</div>
					</div>
				</div>
			</div>
			<div class="tower-wrapper hidden" id="tower-wrapper">
				<div class="floor-room-display">
					<div>Floor: <span id="floor-display"></span></div>
					<div>Room: <span id="room-display"></span></div>
				</div>
				<div class="fight-buttons-section">
					<button class="fight-button" onclick="startAscending()" id="ascend-button">Ascend Tower</button>
					<button class="fight-button hidden" onclick="startFighting()" id="fight-button">Fight</button>
					<button class="fight-button hidden" onclick="startDescending()" id="descend-button">Descend Tower</button>
					<button class="auto-fight-button">AutoFight</button>
				</div>
				
				<div class="circle-outer">
					<div class='breakup-outer'>
    					<div class="outer" id="tower-cell-16"></div>
  					</div>
					<div class='breakup-outer'>
    					<div class="outer" id="tower-cell-15"></div>
  					</div>
  					<div class='breakup-outer'>
    					<div class="outer" id="tower-cell-14"></div>
  					</div>
  					<div class='breakup-outer'>
    					<div class="outer" id="tower-cell-13"></div>
  					</div>
  					<div class='breakup-outer'>
    					<div class="outer" id="tower-cell-12"></div>
  					</div>
  					<div class='breakup-outer'>
    					<div class="outer" id="tower-cell-11"></div>
  					</div>
  					<div class='breakup-outer'>
    					<div class="outer" id="tower-cell-10"></div>
  					</div>
  					<div class='breakup-outer'>
    					<div class="outer" id="tower-cell-9"></div>
  					</div>
  					<div class='breakup-outer'>
    					<div class="outer" id="tower-cell-8"></div>
  					</div>
  					<div class='breakup-outer'>
    					<div class="outer" id="tower-cell-7"></div>
  					</div>
  					<div class='breakup-outer'>
    					<div class="outer" id="tower-cell-6"></div>
  					</div>
  					<div class='breakup-outer'>
    					<div class="outer" id="tower-cell-5"></div>
  					</div>
  					<div class='breakup-outer'>
    					<div class="outer" id="tower-cell-4"></div>
  					</div>
  					<div class='breakup-outer'>
    					<div class="outer" id="tower-cell-3"></div>
  					</div>
  					<div class='breakup-outer'>
    					<div class="outer" id="tower-cell-2"></div>
  					</div>
  					<div class='breakup-outer'>
    					<div class="outer" id="tower-cell-1"></div>
  					</div>
  					<div class='circle-inner'>
    					<div class='breakup-inner'>
    						<div class="inner" id="tower-cell-17"></div>
    					</div>
    					<div class='breakup-inner'>
    						<div class="inner" id="tower-cell-18"></div>
    					</div>
    					<div class='breakup-inner'>
    						<div class="inner" id="tower-cell-19"></div>
    					</div>
    					<div class='breakup-inner'>
     						<div class="inner" id="tower-cell-20"></div>
    					</div>
    					<div class='breakup-inner'>
      						<div class="inner" id="tower-cell-21"></div>
    					</div>
    					<div class='breakup-inner'>
      						<div class="inner" id="tower-cell-22"></div>
    					</div>
    					<div class='breakup-inner'>
      						<div class="inner" id="tower-cell-23"></div>
    					</div>
    					<div class='breakup-inner'>
      						<div class="inner" id="tower-cell-24"></div>
    					</div>
    					<div class='circle-center ' id="tower-cell-25"></div>
   					</div>
				</div>
			</div>
		</section>
		<section class="text-log-wrapper">
			<div class="filter-options">
				<button onclick="addtext()">add text</button>
			</div>
			<div class="scroll-area">
				<div class="text-display">
					<div class="anchor"></div>
				</div>
			</div>
		</section>
		<section class="upgrades-wrapper">
			<nav class="upgrades-nav">
				<button class="upgrades-nav-selector nav-selected" id="upgrades-selector" onclick="upgradesNavBarClick(id)"><span>Upgrades</span></button>
				<button class="upgrades-nav-selector temp-hidden" id="spellbook-selector" onclick="upgradesNavBarClick(id)"><span>Spell Book</span></button>
				<button class="upgrades-nav-selector temp-hidden" id="golems-selector" onclick="upgradesNavBarClick(id)"><span>Golems</span></button>
				<button class="upgrades-nav-selector temp-hidden" id="something-selector" onclick="upgradesNavBarClick(id)"><span>????</span></div>
			</nav>
			<div class="upgrades-display-wrapper" id="upgrades-display">
				<section class="type-upgrades-wrapper">
					<h3 class="upgrades-titles">One Time</h3>
					<div class="upgrades-purchase-wrapper">
						<button class="upgrades-purchase-button" onmouseover="mousein(event, 'purchase', 'individual', 'spellbook')" onmouseout="mouseout()" onclick="purchaseUpgrade('oneTime', 'spellbook', null, null)" id="spellbook-unlock"><span>Spell book</span></button>
						<button class="upgrades-purchase-button hidden" onmouseover="mousein(event, 'purchase', 'individual', 'fight')" onmouseout="mouseout()" onclick="purchaseUpgrade('oneTime', 'fight', null, null)" id="fight-unlock"><span>Tower Key</span></button>
						<button class="upgrades-purchase-button hidden" onmouseover="mousein(event, 'purchase', 'individual', 'golems')" onmouseout="mouseout()" onclick="purchaseUpgrade('oneTime', 'golems', null, null)" id="golems-unlock"><span>Golem Core</span></button>
					</div>
				</section>
				<section class="type-upgrades-wrapper">
					<h3 class="upgrades-titles">Storage</h3>
					<div class="upgrades-purchase-wrapper">
						<button class="upgrades-purchase-button" onmouseover="mousein(event, 'purchase', 'storage', 'herb')" onmouseout="mouseout()" onclick="purchaseUpgrade('repeatable', 'storage', 'tierOne', 'herb')"><span>Herbs</span><span id="herb-storage-level">0</span></button>
						<button class="upgrades-purchase-button" onmouseover="mousein(event, 'purchase', 'storage', 'mythril')" onmouseout="mouseout()" onclick="purchaseUpgrade('repeatable', 'storage', 'tierOne', 'mythril')"><span>Mythril</span><span id="mythril-storage-level">0</span></button>
						<button class="upgrades-purchase-button" onmouseover="mousein(event, 'purchase', 'storage', 'yew')" onmouseout="mouseout()" onclick="purchaseUpgrade('repeatable', 'storage', 'tierOne', 'yew')"><span>Yew</span><span id="yew-storage-level">0</span></button>
						<button class="upgrades-purchase-button" onmouseover="mousein(event, 'purchase', 'storage', 'crystal')" onmouseout="mouseout()" onclick="purchaseUpgrade('repeatable', 'storage', 'tierOne', 'crystal')"><span>Crystal</span><span id="crystal-storage-level">0</span></button>
						<button class="upgrades-purchase-button" onmouseover="mousein(event, 'purchase', 'storage', 'arcana')" onmouseout="mouseout()" onclick="purchaseUpgrade('repeatable', 'storage', 'tierOne', 'arcana')"><span>Arcana</span><span id="arcana-storage-level">0</span></button>
					</div>
				</section>
				<section class="type-production-upgrades-wrapper">
					<h3 class="upgrades-titles">Active</h3>
					<div class="upgrades-purchase-wrapper">
						<button class="upgrades-purchase-button" onmouseover="mousein(event, 'purchase', 'activeProduction', 'herb')" onmouseout="mouseout()" onclick="purchaseUpgrade('repeatable', 'activeProduction', 'tierOne', 'herb')"><span>Herbs</span><span id="herb-activeProduction-level">0</span></button>
						<button class="upgrades-purchase-button" onmouseover="mousein(event, 'purchase', 'activeProduction', 'mythril')" onmouseout="mouseout()" onclick="purchaseUpgrade('repeatable', 'activeProduction', 'tierOne', 'mythril')"><span>Mythril</span><span id="mythril-activeProduction-level">0</span></button>
						<button class="upgrades-purchase-button" onmouseover="mousein(event, 'purchase', 'activeProduction', 'yew')" onmouseout="mouseout()" onclick="purchaseUpgrade('repeatable', 'activeProduction', 'tierOne', 'yew')"><span>Yew</span><span id="yew-activeProduction-level">0</span></button>
						<button class="upgrades-purchase-button" onmouseover="mousein(event, 'purchase', 'activeProduction', 'crystal')" onmouseout="mouseout()" onclick="purchaseUpgrade('repeatable', 'activeProduction', 'tierOne', 'crystal')"><span>Crystal</span><span id="crystal-activeProduction-level">0</span></button>
						<button class="upgrades-purchase-button" onmouseover="mousein(event, 'purchase', 'activeProduction', 'arcana')" onmouseout="mouseout()" onclick="purchaseUpgrade('repeatable', 'activeProduction', 'tierOne', 'arcana')"><span>Arcana</span><span id="arcana-activeProduction-level">0</span></button>
					</div>
				</section>
			</div>
			<div class="upgrades-display-wrapper golems hidden" id="golems-display">
				<section class="golems-top-wrapper">
					<div class="golems-construct" onmouseover="mousein(event, 'purchase', 'golems', 'construct')" onmouseout="mouseout()">
						<span>Golems</span>
						<p><span id="golems-total-display">0</span> / <span id="golems-storage-display">10</span> Total</p>
						<p><span id="golems-active-display">0</span> / <span id="golems-total-working-display">10</span> Working</p>
					</div>
					<div class="golems-construct" onmouseover="mousein(event, 'purchase', 'golems', 'construct')" onmouseout="mouseout()">
						<span>Construct</span>
						<button class="golem-build-button" onclick="buildGolem()">Build</button>
					</div>
				</section>
				<section class="golem-assignment-type-wrapper">
					<button class="assignment-type-selector-button golem-assign-active" id="golem-assign" onclick="assignType(id)">Assign</button>
					<button class="assignment-type-selector-button" id="golem-remove" onclick="assignType(id)">Remove</button>
				</section>
				<section class="golem-assignment-wrapper">
					<button class="golem-assignment" onclick="golemAssign('herb')">
						<span>Herbs</span>
						<span id="herb-golem-count">0</span>
					</button>
					<button class="golem-assignment" onclick="golemAssign('mythril')">
						<span>Mythril</span>
						<span id="mythril-golem-count">0</span>
					</button>
					<button class="golem-assignment" onclick="golemAssign('yew')">
						<span>Yew</span>
						<span id="yew-golem-count">0</span>
					</button>
					<button class="golem-assignment" onclick="golemAssign('crystal')">
						<span>Crystals</span>
						<span id="crystal-golem-count">0</span>
					</button>
					<button class="golem-assignment" onclick="golemAssign('arcana')">
						<span>Arcana</span>
						<span id="arcana-golem-count">0</span>
					</button>
				</section>
			</div>
			<div class="upgrades-display-wrapper spellbook-display hidden" id="spellbook-display">
				<div class="spell-display heal-color">
					<span class="-name">Heal</span>
					<span class="spell-level" id="heal-level">1</span>
					<div class="exp-display">
						<div class="exp-bar" id="heal-exp-bar">
						</div>
						<div class="exp-numbers">
							<span id="heal-expCurrent">0</span> / <span id="heal-expMax">25</span>
						</div>
					</div>
				</div>
				<div class="spell-display manaBolt-color">
					<span class="spell-name"> Mana Bolt</span>
					<span class="spell-level" id="manaBolt-level">1</span>
					<div class="exp-display">
						<div class="exp-bar" id="manaBolt-exp-bar">
						</div>
						<div class="exp-numbers">
							<span id="manaBolt-expCurrent">0</span> / <span id="manaBolt-expMax">50</span>
						</div>
					</div>
				</div>
			</div>
			<div class="upgrades-display-wrapper hidden" id="something-display">???</div>
		</section>
		<section class="settings-wrapper">
			<button class="settings-buttons" onclick="save()">Save</button>
			<button class="settings-buttons" onclick="exporting()">Export</button>
			<button class="settings-buttons" onclick="importing()">Import</button>
			<button class="settings-buttons">Achievements</button>
			<button class="settings-buttons">Settings</button>
		</section>
		<div class="purchaseTooltips hidden" id="purchaseTooltips"><span class="purchaseTooltipName" id="purchaseTooltipName"></span><span class='purchaseTooltipInfo' id="purchaseTooltipInfo"></span><span class="purchaseTooltipCost" id="purchaseTooltipCost"></span></div>
		<script src="jquery-3.6.3.js"></script>
		<script src="game.js"></script>
		<script src="constants.js"></script>
		<script src="lz-string.js"></script>
		<script src="updateversion.js"></script>
		<script src="saveexportload.js"></script>
		<script src="main.js"></script>
	</body>
</html>
